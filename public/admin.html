<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: linear-gradient(180deg, #d4ecfc 0%, #d4ecfc 50%, #e2f7e4 50%, #e2f7e4 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        h1, h2 { color: #1a3a5f; }
        
        .admin-toggle-btn { background: #c62828; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        .flex-row { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .card { flex: 1; min-width: 300px; border: 1px solid #ccc; padding: 20px; border-radius: 6px; background: #fafafa; margin-bottom: 20px; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; border-radius: 4px; border: 1px solid #ccc;}
        .card button { background: #1a3a5f; color: white; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #1a3a5f; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .flagged { background-color: #ffcdd2 !important; color: #b71c1c; font-weight: bold; }
        
        /* Hidden state configuration */
        #absenceCardAdmin { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>DE Chis Stores - System Administration Dashboard</h1>
        <button class="admin-toggle-btn" onclick="toggleAbsenceLog()">View Absence Reports</button>
    </div>
    
    <div class="flex-row">
        <div class="card">
            <h2>Register New Worker</h2>
            <input type="text" id="newId" placeholder="Assign ID (e.g. EMP004)">
            <input type="text" id="newName" placeholder="Full Name">
            <input type="number" id="requiredHours" placeholder="Shift Duration (e.g. 8)" min="1" max="24">
            <button onclick="registerEmployee()">Add Employee</button>
        </div>
        <div class="card">
            <h2>Active Roster Panel</h2>
            <table id="rosterTable"><thead><tr><th>ID</th><th>Name</th></tr></thead><tbody></tbody></table>
        </div>
    </div>

    <div id="absenceCardAdmin" class="card" style="border-left: 5px solid #c62828;">
        <h2>Absence Log Reports (Explanations)</h2>
        <table id="absenceTable">
            <thead><tr><th>Date</th><th>ID</th><th>Name</th><th>Reason Shared</th><th>Time Filed</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h2>Live Attendance Streams Log (10-Hour Requirement Monitoring)</h2>
        <table id="logsTable">
            <thead>
                <tr><th>Date</th><th>ID</th><th>Name</th><th>Checked In</th><th>Checked Out</th><th>Total Duration</th><th>Status</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // Toggle Visibility of the Admin Absence Log Container
    function toggleAbsenceLog() {
        const panel = document.getElementById('absenceCardAdmin');
        const btn = document.querySelector('.admin-toggle-btn');
        if (panel.style.display === "block") {
            panel.style.display = "none";
            btn.innerText = "View Absence Reports";
        } else {
            panel.style.display = "block";
            btn.innerText = "Hide Absence Reports";
        }
    }

    async function loadDashboardData() {
        const res = await fetch('/api/admin/data');
        const data = await res.json();
        
        document.querySelector('#rosterTable tbody').innerHTML = data.employeeList.map(e => `<tr><td>${e.id}</td><td>${e.name}</td></tr>`).join('');
        
        document.querySelector('#absenceTable tbody').innerHTML = data.absenceReports.map(a => `
            <tr><td>${a.date}</td><td>${a.id}</td><td>${a.name}</td><td><strong>${a.reason}</strong></td><td>${a.submittedAt}</td></tr>
        `).join('');

        document.querySelector('#logsTable tbody').innerHTML = data.logs.map(l => `
            <tr class="${l.flagged ? 'flagged' : ''}">
                <td>${l.date}</td><td>${l.id}</td><td>${l.name}</td><td>${l.checkIn}</td>
                <td>${l.checkOut ? l.checkOut : '<span style="color:orange">On Shift</span>'}</td>
                <td>${l.hoursWorked ? l.hoursWorked : '--'}</td>
                <td>${l.flagged ? '⚠️ FLAGGED EARLY DEPARTURE' : (l.checkOut ? 'Good Shift' : 'Working')}</td>
            </tr>
        `).join('');
    }

    async function registerEmployee() {
        const id = document.getElementById('newId').value.trim();
        const name = document.getElementById('newName').value.trim();
        if(!id || !name) return alert("Fill in parameters");
        const res = await fetch('/api/admin/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, name })
        });
        const data = await res.json();
        if(data.success) loadDashboardData();
    }

    setInterval(loadDashboardData, 3000);
    loadDashboardData();
</script>
</body>
</html>
